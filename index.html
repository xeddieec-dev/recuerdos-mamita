<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Rincón Especial</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; text-align: center; color: #333; margin: 0; padding: 20px; }
        header { margin-bottom: 30px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 5px; }
        .phrase { font-style: italic; margin-top: 10px; color: #555; }
        h1 { color: #ff4b5c; }
    </style>
</head>
<body>
    <header>
        <h1>Momentos Especiales</h1>
        <p>Un espacio solo para nosotros ❤️</p>
    </header>

    <div class="gallery">
        <div class="card">
            <img src="foto1.jpg" alt="Recuerdo 1">
            <p class="phrase">"La mejor frase que se me ocurrió para esta foto."</p>
        </div>
        <div class="card">
            <img src="foto2.jpg" alt="Recuerdo 2">
            <p class="phrase">"Otra frase llena de sentimiento aquí."</p>
        </div>
    </div>
</body>
</html>
